name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRS_BASE_URL: https://github-readme-stats-sigma-five.vercel.app

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Ensure profile directory exists
        run: mkdir -p profile

      - name: Download cards
        shell: bash
        run: |
          download_keep_old() {
            local url="$1"
            local out="$2"
            local tmp="${out}.tmp"

            if curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o "$tmp" "$url"; then
              mv "$tmp" "$out"
              echo "Updated $out"
            else
              rm -f "$tmp"
              echo "Download failed for $out, keeping existing file"
            fi
          }

          download_keep_old "${GRS_BASE_URL}/api?username=${{ github.repository_owner }}&show_icons=true&token=${{ secrets.TOKEN }}&hide_border=true&theme=tokyonight&border_radius=10" "profile/stats.svg"
          sleep 5
          download_keep_old "${GRS_BASE_URL}/api/top-langs?username=${{ github.repository_owner }}&layout=compact&token=${{ secrets.TOKEN }}&hide_border=true&theme=tokyonight&border_radius=10" "profile/top-langs.svg"
          sleep 5
          download_keep_old "${GRS_BASE_URL}/api/pin?username=readme-tools&repo=github-readme-stats&token=${{ secrets.TOKEN }}&hide_border=true&theme=tokyonight&border_radius=10" "profile/pin-readme-tools-github-readme-stats.svg"

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f profile/streak.svg
          git add -A profile
          git diff --cached --quiet && exit 0
          git commit -m "Update README cards"
          git push