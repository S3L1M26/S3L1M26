name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Ensure profile directory exists
        run: mkdir -p profile

      - name: Download stats card
        run: |
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o profile/stats.svg "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=tokyo_night&border_color=58a6ff&title_color=58a6ff"

      - name: Download top languages card
        run: |
          sleep 5
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o profile/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs?username=${{ github.repository_owner }}&layout=compact&theme=tokyo_night&border_color=58a6ff&title_color=58a6ff"

      - name: Download pin card
        run: |
          sleep 5
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o profile/pin-readme-tools-github-readme-stats.svg "https://github-readme-stats.vercel.app/api/pin?username=readme-tools&repo=github-readme-stats&theme=tokyo_night&border_color=58a6ff&title_color=58a6ff"

      - name: Download streak card
        run: |
          sleep 5
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o profile/streak.svg "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=tokyonight"

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile
          git diff --cached --quiet && exit 0
          git commit -m "Update README cards"
          git push